<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pacientes Obstétricos</title>
    <!-- Font Awesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #e91e63; /* Rosa para contexto obstétrico */
            --secondary: #9c27b0;
            --bg: #fdf2f8;
            --white: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card {
            background: var(--white);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(233, 30, 99, 0.1);
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        h2 {
            color: var(--primary);
            text-align: center;
            margin-top: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .grid-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-width { grid-column: span 2; }

        .input-box {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #666;
        }

        .input-field {
            width: 100%;
            padding: 12px;
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s, filter 0.2s;
        }

        .btn-add { background-color: var(--primary); color: white; }
        .btn-export { background-color: #27ae60; color: white; }
        button:hover { filter: brightness(1.1); }
        button:active { transform: scale(0.98); }

        .table-container {
            width: 100%;
            max-width: 900px;
            overflow-x: auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 700px;
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background-color: #fafafa;
            color: var(--primary);
            font-weight: bold;
        }

        .status-pill {
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            background: #e1f5fe;
            color: #0288d1;
        }
    </style>
</head>
<body>

<div class="card">
    <h2><i class="fas fa-baby-carriage"></i> Pré-Natal Digital</h2>
    
    <div class="grid-inputs">
        <div class="input-box full-width">
            <label><i class="fas fa-user"></i> Nome da Paciente</label>
            <input type="text" id="nome" class="input-field" placeholder="Nome completo">
        </div>
        
        <div class="input-box">
            <label><i class="fas fa-weight"></i> Peso (kg)</label>
            <input type="number" id="peso" class="input-field" step="0.1" placeholder="00.0">
        </div>

        <div class="input-box">
            <label><i class="fas fa-ruler-vertical"></i> Altura (m)</label>
            <input type="number" id="altura" class="input-field" step="0.01" placeholder="1.65">
        </div>

        <div class="input-box">
            <label><i class="fas fa-calendar-alt"></i> DUM (Data Últ. Menstruação)</label>
            <input type="date" id="dum" class="input-field">
        </div>

        <div class="input-box">
            <label><i class="fas fa-notes-medical"></i> Acompanhamento</label>
            <select id="status" class="input-field">
                <option value="1º Trimestre">1º Trimestre</option>
                <option value="2º Trimestre">2º Trimestre</option>
                <option value="3º Trimestre">3º Trimestre</option>
                <option value="Pós-parto">Pós-parto</option>
            </select>
        </div>
    </div>

    <div class="btn-container">
        <button class="btn-add" onclick="adicionar()">
            <i class="fas fa-plus-circle"></i> Salvar Registro
        </button>
        <button class="btn-export" onclick="exportarExcel()">
            <i class="fas fa-file-excel"></i> Exportar Dados
        </button>
    </div>
</div>

<div class="table-container">
    <table id="tabelaDados">
        <thead>
            <tr>
                <th>Paciente</th>
                <th>Peso</th>
                <th>Altura</th>
                <th>DUM</th>
                <th>Status/Acompanhamento</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<script>
    let registros = [];

    function adicionar() {
        const nome = document.getElementById('nome').value;
        const peso = document.getElementById('peso').value;
        const altura = document.getElementById('altura').value;
        const dum = document.getElementById('dum').value;
        const status = document.getElementById('status').value;

        if (!nome || !peso || !altura || !dum) {
            alert("Por favor, preencha todos os campos obrigatórios.");
            return;
        }

        // Formatar data para exibição PT-BR
        const dataFormatada = dum.split('-').reverse().join('/');

        const novo = {
            "Paciente": nome,
            "Peso (kg)": parseFloat(peso),
            "Altura (m)": parseFloat(altura),
            "DUM": dataFormatada,
            "Acompanhamento": status
        };

        registros.push(novo);
        
        // Atualizar Tabela
        const tbody = document.querySelector("#tabelaDados tbody");
        const row = tbody.insertRow();
        row.innerHTML = `
            <td><strong>${nome}</strong></td>
            <td>${peso} kg</td>
            <td>${altura} m</td>
            <td>${dataFormatada}</td>
            <td><span class="status-pill">${status}</span></td>
        `;

        // Limpar
        document.getElementById('nome').value = '';
        document.getElementById('peso').value = '';
        document.getElementById('altura').value = '';
        document.getElementById('dum').value = '';
    }

    function exportarExcel() {
        if (registros.length === 0) {
            alert("Não há dados para exportar.");
            return;
        }
        const ws = XLSX.utils.json_to_sheet(registros);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Acompanhamento");
        XLSX.writeFile(wb, "Relatorio_Pacientes_DUM.xlsx");
    }
</script>

</body>
</html>
